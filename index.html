<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>EXPENSE TRACKER</h2>

    <div class="input-container">
        <input type="number" id="amount" placeholder="Choose expense amount">
        <input type="text" id="description" placeholder="Choose description">
        <select id="category">
            <option value="Movie">Movie</option>
            <option value="Fuel">Fuel</option>
            <option value="Grocery">Grocery</option>
            <option value="Food">Food & Dining</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Health">Health & Fitness</option>
            <option value="Shopping">Shopping</option>
            <option value="Education">Education</option>
            <option value="Travel">Travel</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Rent">Rent</option>
            <option value="Insurance">Insurance</option>
            <option value="Investments">Investments</option>
            <option value="Bills">Bills</option>
            <option value="Gifts">Gifts & Donations</option>
            <option value="PersonalCare">Personal Care</option>
            <option value="Pets">Pets</option>
            <option value="Internet">Internet & Mobile</option>
            <option value="Loan">Loan Payments</option>
            <option value="Savings">Savings</option>
            <option value="Maintenance">Maintenance</option>
            <option value="Misc">Miscellaneous</option>
        </select>
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <ul id="expenseList"></ul>

    <script src="script.js"></script>
</body>
</html>
